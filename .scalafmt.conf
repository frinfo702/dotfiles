version = "3.8.3"
runner.dialect = scala3

align {
  preset = most
  stripMargin = true
}

maxColumn = 120
lineEndings = unix

continuationIndent.callSite = 2
continuationIndent.defnSite = 2

newlines {
  alwaysBeforeTopLevelStatements = true
  afterImplicitKW = true
}

rewrite {
  rules = [AvoidInfix, SortImports, RedundantBraces, RedundantParens]
  sortImports {
    ascii = true
    groups = ["re:dummy"]
  }
}
