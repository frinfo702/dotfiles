# https://github.com/nametake/golangci-lint-langserver
# [language-server.golangci-lint]
# command = "golangci-lint-langserver"
# config = { command = [
#   "golangci-lint",
#   "run",
#   "--enable-all",
#   "--disable",
#   "lll",
#   "--out-format",
#   "json",
#   "--issues-exit-code=1"
# ] }
# --------
[[language]]
name = "toml"
auto-format = true
# https://github.com/bd82/toml-tools/tree/master/packages/prettier-plugin-toml
formatter = { command = "prettier", args = ["--parser", "toml"] }

[[language]]
name = "json"
formatter = { command = "prettier", args = ["--parser", "json"] }

[[language]]
name = "markdown"
# https://github.com/executablebooks/mdformat
formatter = { command = "mdformat", args = ["-"] }

[[language]]
name = "rust"

[[language]]
name = "go"
auto-format = true
formatter = { command = "gofmt", args = [] }
language-servers = ["gopls", "golangci-lint"]

[[language]]
name = "yaml"
formatter = { command = "prettier", args = ["--parser", "yaml"] }

################################
# Dockerfile / Docker Compose
################################
[[language]]
name = "dockerfile"
auto-format = true
# LSP: docker-langserver (npm i -g dockerfile-language-server-nodejs)
# フォーマッター: LSP (docker-langserver) 経由でフォーマット

[[language]]
name = "docker-compose"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "yaml"] }
# LSP: docker-compose-langserver (npm i -g @microsoft/compose-language-service)

################################
# TypeScript / JavaScript
################################
[[language]]
name = "typescript"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "tsx"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "javascript"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "babel"] }

[[language]]
name = "jsx"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "babel"] }

################################
# C / C++
################################
[[language]]
name = "c"
auto-format = true
formatter = { command = "clang-format", args = ["--style=file", "--assume-filename={buffer_path}"] }

[[language]]
name = "cpp"
auto-format = true
formatter = { command = "clang-format", args = ["--style=file", "--assume-filename={buffer_path}"] }

################################
# Lua
################################
[[language]]
name = "lua"
auto-format = true
formatter = { command = "stylua", args = ["--search-parent-directories", "--stdin-filepath", "{buffer_path}", "-"] }

################################
# Shell
################################
[[language]]
name = "bash"
auto-format = true
formatter = { command = "shfmt", args = ["-i", "2", "-ci", "-"] }

################################
# Terraform / HCL
################################
[[language]]
name = "hcl"
auto-format = true
formatter = { command = "terraform", args = ["fmt", "-"] }

################################
# HTML / CSS
################################
[[language]]
name = "html"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "html"] }

[[language]]
name = "css"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "css"] }

################################
# Typst
################################
[[language]]
name = "typst"
auto-format = true
# LSP: tinymist (brew install tinymist)
# formatter: tinymist の LSP 経由でフォーマットされる


[[language]]
name = "scala"
indent = { tab-width = 2, unit = "  " }

[language-server.metals]
command = "metals"
# metals v2のJavaインデクサーがJDK内部APIを使うため --add-exports が必要
args = [
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.jvm=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.platform=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED",
  "-J--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED",
]

# Bloop(ビルドサーバー)のヒープを増やす。デフォルトだと大規模リポジトリでOOMになる
[language-server.metals.config.metals]
bloopJvmProperties = ["-Xmx6G", "-Xss4m", "-XX:+UseZGC", "-XX:ZUncommitDelay=30", "-XX:ZCollectionInterval=5"]


#########################
# python
#########################
[[language]]
name = "python"
auto-format = true
formatter = { command = "ruff", args = ["format", "--stdin-filename", "{buffer_path}"] }
[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.pyright.config]
python.analysis.venvPath = "."
python.analysis.venv = ".venv"
python.analysis.lint = true
python.analysis.inlayHint.enable = true
python.analysis.autoSearchPaths = true
python.analysis.diagnosticMode = "workspace"
python.analysis.useLibraryCodeForType = true
python.analysis.logLevel = "Error"
python.analysis.typeCheckingMode = "off"
python.analysis.autoImoprtCompletion = true
python.analysis.reportOptionalSubscript = false
python.analysis.reportOptionalMemberAccess = false

[language-server.ruff]
command = "ruff"
args = ["server", "-q", "--preview"]


